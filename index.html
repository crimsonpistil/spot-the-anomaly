<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interactive network traffic detective. Spot anomalies in flow tables, log streams, and dashboards. MITRE ATT&CK-mapped scenarios for SOC analysts and threat hunters.">
<title>[6B74] Spot the Anomaly // Net Detective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10; --bg2:#0f1117; --bg3:#161b22; --bg4:#1c2230;
  --border:#21262d; --border2:#30363d;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --accent:#58a6ff; --accent2:#1f6feb;
  --green:#3fb950; --amber:#d29922; --red:#f85149;
  --purple:#bc8cff; --teal:#39d353; --orange:#ffa600;
  --phosphor:#7ee787;
  --glow-green:0 0 6px rgba(126,231,135,.35);
  --glow-amber:0 0 6px rgba(210,153,34,.45);
  --glow-red:0 0 6px rgba(248,81,73,.45);
  --mono:'Cascadia Code','Fira Code','Consolas','Menlo','Courier New',monospace;
  --crt:'VT323','Cascadia Code',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6;min-height:100vh;position:relative}

/* Subtle CRT scanlines - much lighter than v1 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:300;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(126,231,135,.012) 2px,rgba(126,231,135,.012) 3px);
}
/* Soft vignette */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:299;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.35) 100%);
}

/* BOOT OVERLAY */
#boot{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;color:var(--phosphor);
  text-shadow:var(--glow-green);
}
#boot.gone{opacity:0;pointer-events:none;transition:opacity .35s ease}
.boot-inner{max-width:560px;padding:24px;width:100%}
.boot-line{margin:2px 0;white-space:pre;opacity:0;animation:bootln .25s forwards}
.boot-ok{color:var(--green)}
.boot-warn{color:var(--amber);text-shadow:var(--glow-amber)}
.boot-cursor{display:inline-block;width:9px;height:14px;background:var(--phosphor);box-shadow:var(--glow-green);animation:blink 1s steps(2) infinite;vertical-align:-2px;margin-left:4px}
@keyframes bootln{to{opacity:1}}
@keyframes blink{50%{opacity:0}}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:0;z-index:200;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;text-decoration:none}
.logo span{color:var(--text3);font-weight:400}
.crumb{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
.crumb a{color:var(--text3);text-decoration:none}
.crumb a:hover{color:var(--accent)}

.site-switcher{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border2);border-radius:5px;overflow:hidden;font-family:var(--mono);font-size:10px;font-weight:700;margin:0 6px;letter-spacing:.06em}
.switcher-side{padding:5px 11px;color:var(--text3);text-decoration:none;transition:all .15s;border-right:1px solid var(--border2);cursor:pointer}
.switcher-side:last-child{border-right:none}
.switcher-side:hover:not(.active){color:var(--text);background:var(--bg2)}
.switcher-side.active{background:var(--accent);color:#fff;cursor:default}

.header-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.live-dot{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--phosphor);text-shadow:var(--glow-green);letter-spacing:.1em}
.live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--phosphor);box-shadow:var(--glow-green);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stat{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap}
.stat strong{color:var(--text);font-weight:600}
.stat .v-good{color:var(--phosphor);text-shadow:var(--glow-green)}
.stat .v-warn{color:var(--amber);text-shadow:var(--glow-amber)}
.stat .v-bad{color:var(--red);text-shadow:var(--glow-red)}

/* MODE BAR */
.mode-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mode-bar .filter-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.mode-btn{background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.spacer{flex:1}
.reset-btn{background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-family:var(--mono);font-size:10px;padding:3px 10px;cursor:pointer}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* LAYOUT */
.container{max-width:1400px;margin:0 auto;padding:16px 20px;display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
@media(max-width:900px){.container{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{position:sticky;top:96px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.sidebar-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.toc-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;color:var(--text2);transition:background .15s;margin-bottom:2px}
.toc-item:hover{background:var(--bg3);color:var(--text)}
.toc-item.active{background:rgba(31,111,235,.15);color:var(--accent)}
.toc-item.done{color:var(--text3)}
.toc-item.done .toc-id{color:var(--green)}
.toc-id{font-family:var(--mono);font-size:10px;font-weight:600;min-width:46px;color:var(--accent)}
.toc-name{font-size:11px;flex:1}
.toc-mark{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}
.toc-mark.pass{color:var(--green)}
.toc-mark.partial{color:var(--amber)}
.toc-mark.fail{color:var(--red)}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.sidebar-stat{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);padding:3px 8px}
.sidebar-stat strong{color:var(--text)}

/* MAIN */
main{min-width:0}

/* SCENARIO HEADER (mirrors tech-header) */
.sc-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px 7px 0 0}
.sc-id{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);background:rgba(31,111,235,.15);border:1px solid rgba(88,166,255,.3);border-radius:4px;padding:2px 7px;text-shadow:0 0 4px rgba(88,166,255,.4)}
.sc-name{font-size:13px;font-weight:600}
.diff-badge{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;border:1px solid;margin-left:4px}
.diff-easy{color:var(--green);border-color:var(--green);background:rgba(63,185,80,.1)}
.diff-medium{color:var(--amber);border-color:var(--amber);background:rgba(210,153,34,.1)}
.diff-hard{color:var(--red);border-color:var(--red);background:rgba(248,81,73,.1)}
.view-tag{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto;background:var(--bg4);border-radius:3px;padding:2px 8px}

.sc-body{background:var(--bg2);border:1px solid var(--border);border-top:none;padding:14px 16px}
.sc-brief{font-size:13px;color:var(--text2);line-height:1.7}
.sc-brief strong{color:var(--text)}

.callout{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:4px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6}
.callout.hint{border-left-color:var(--amber)}
.callout-label{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px}
.callout.hint .callout-label{color:var(--amber)}

/* DATA VIEW */
.data-view{background:var(--bg2);border:1px solid var(--border);border-top:none;overflow:hidden}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.code-lang{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--purple)}
.code-meta{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* FLOW TABLE */
table.flows{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
table.flows thead{background:var(--bg3)}
table.flows th{text-align:left;padding:7px 10px;font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
table.flows td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
table.flows td.wrap{white-space:normal}
table.flows tbody tr{cursor:pointer;transition:background .1s}
table.flows tbody tr:hover{background:var(--bg3)}
table.flows tbody tr.selected{background:rgba(31,111,235,.1)!important;box-shadow:inset 3px 0 0 var(--accent)}
table.flows tbody tr.correct{background:rgba(63,185,80,.08)!important;box-shadow:inset 3px 0 0 var(--green)}
table.flows tbody tr.missed{background:rgba(248,81,73,.08)!important;box-shadow:inset 3px 0 0 var(--red)}
table.flows tbody tr.fp{background:rgba(248,81,73,.04)!important;box-shadow:inset 3px 0 0 var(--red);opacity:.65}
table.flows .col-idx{color:var(--text3);width:30px}
table.flows .col-port{color:var(--accent)}
table.flows .col-proto{color:var(--purple)}
.row-mark{display:inline-block;width:14px;color:var(--accent);font-weight:700}

/* LOG STREAM */
.log-stream{font-family:var(--mono);font-size:11px;max-height:520px;overflow-y:auto}
.log-line{padding:7px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:28px 78px 70px 1fr;gap:10px;align-items:start;transition:background .1s;color:var(--text2)}
.log-line:hover{background:var(--bg3)}
.log-line.selected{background:rgba(31,111,235,.1);box-shadow:inset 3px 0 0 var(--accent);color:var(--text)}
.log-line.correct{background:rgba(63,185,80,.08);box-shadow:inset 3px 0 0 var(--green)}
.log-line.missed{background:rgba(248,81,73,.08);box-shadow:inset 3px 0 0 var(--red)}
.log-line.fp{background:rgba(248,81,73,.04);box-shadow:inset 3px 0 0 var(--red);opacity:.65}
.log-idx{color:var(--text3)}
.log-time{color:var(--text3)}
.log-source{color:var(--purple);font-weight:600;text-transform:uppercase;font-size:10px}
.log-msg{color:var(--text);word-break:break-all;line-height:1.5}

/* CONTROLS */
.controls{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 7px 7px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.sel-count{font-family:var(--mono);font-size:11px;color:var(--text3)}
.sel-count strong{color:var(--accent);font-weight:700}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent);color:#fff}
.btn-warn{border-color:var(--amber);color:var(--amber)}
.btn-warn:hover{background:rgba(210,153,34,.15)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:disabled:hover{border-color:var(--border2);color:var(--text2);background:var(--bg3)}

/* REVEAL */
.reveal{background:var(--bg2);border:1px solid var(--green);border-radius:8px;margin-top:16px;overflow:hidden}
.reveal.partial{border-color:var(--amber)}
.reveal.fail{border-color:var(--red)}
.reveal-hdr{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap}
.reveal-score{font-family:var(--crt);font-size:42px;font-weight:400;color:var(--phosphor);text-shadow:var(--glow-green);line-height:1;letter-spacing:.02em}
.reveal.partial .reveal-score{color:var(--amber);text-shadow:var(--glow-amber)}
.reveal.fail .reveal-score{color:var(--red);text-shadow:var(--glow-red)}
.reveal-score small{font-size:14px;color:var(--text3);font-weight:400;text-shadow:none;font-family:var(--mono)}
.verdict{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border:1px solid;border-radius:4px}
.v-confirmed{color:var(--green);border-color:var(--green);background:rgba(63,185,80,.1)}
.v-partial{color:var(--amber);border-color:var(--amber);background:rgba(210,153,34,.1)}
.v-incon{color:var(--red);border-color:var(--red);background:rgba(248,81,73,.1)}
.reveal-stats{display:flex;gap:12px;font-family:var(--mono);font-size:10px;margin-left:auto;flex-wrap:wrap}
.reveal-stats span{padding:3px 8px;border-radius:4px;background:var(--bg4)}
.s-hit{color:var(--green)}
.s-miss{color:var(--red)}
.s-fp{color:var(--amber)}

/* TABS (mirrors hunt site detail panel) */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 12px;background:var(--bg2)}
.dtab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--mono);font-size:11px;font-weight:500;padding:8px 14px 9px;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.dtab:hover{color:var(--text2)}
.dtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.dtab.t-mit.active{color:var(--amber);border-bottom-color:var(--amber)}
.dtab.t-det.active{color:var(--purple);border-bottom-color:var(--purple)}
.tab-panel{display:none;padding:14px 16px}
.tab-panel.active{display:block}
.tab-panel p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.tab-panel p:last-child{margin-bottom:0}
.tab-panel strong{color:var(--text)}
.tab-panel code{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--border2);padding:1px 5px;border-radius:3px;color:var(--accent)}

.mitre-list{display:flex;flex-direction:column;gap:8px}
.mitre-tag{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:5px}
.mitre-id{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--amber);background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);border-radius:3px;padding:2px 7px;flex-shrink:0}
.mitre-name{font-size:12px;color:var(--text)}

.detect-block{background:var(--bg);border:1px solid var(--border2);border-radius:6px;overflow:hidden;margin-bottom:10px}
.detect-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border)}
.detect-lang{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.l-ark{color:var(--purple)} .l-kib{color:var(--teal)} .l-sur{color:var(--red)}
.copy-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-family:var(--mono);font-size:9px;padding:2px 8px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}
.detect-body{padding:10px 12px;font-family:var(--mono);font-size:11px;color:#a5d6ff;white-space:pre-wrap;word-break:break-all;line-height:1.7;max-height:200px;overflow-y:auto}

.next-bar{display:flex;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg3)}

/* COMPLETE */
.complete{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:32px 24px;text-align:center}
.complete h2{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;letter-spacing:.05em}
.complete .sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.final-score{font-family:var(--crt);font-size:96px;font-weight:400;color:var(--phosphor);text-shadow:0 0 12px rgba(126,231,135,.5),0 0 24px rgba(126,231,135,.25);line-height:1;margin:16px 0 4px;letter-spacing:.02em}
.final-score.partial{color:var(--amber);text-shadow:0 0 12px rgba(210,153,34,.55),0 0 24px rgba(210,153,34,.25)}
.final-score.fail{color:var(--red);text-shadow:0 0 12px rgba(248,81,73,.55),0 0 24px rgba(248,81,73,.25)}
.final-verdict{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:18px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;margin:18px auto;font-family:var(--mono);font-size:10px}
.summary-cell{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:10px}
.summary-cell .lbl{color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.summary-cell .val{font-family:var(--crt);font-size:32px;font-weight:400;color:var(--text);line-height:1;letter-spacing:.02em}
.complete .btn-group{justify-content:center;margin-top:16px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:700px){
  .reveal-stats{margin-left:0;width:100%}
  .header-right .stat{display:none}
  .header-right .stat.keep{display:inline}
}
</style>
</head>
<body>

<div id="boot">
  <div class="boot-inner" id="boot-inner"></div>
</div>

<header>
  <a class="logo" href="https://6b74.dev">[6B74]<span> :: spot-the-anomaly</span></a>
  <div class="site-switcher">
    <a class="switcher-side" href="https://hunt.6b74.dev">HUNT</a>
    <span class="switcher-side active">DETECT</span>
  </div>
  <div class="crumb">// network traffic detective</div>
  <div class="header-right">
    <span class="live-dot">SESSION LIVE</span>
    <span class="stat keep">SCENARIO <strong id="stat-scenario">1/2</strong></span>
    <span class="stat">SCORE <strong id="stat-score" class="v-good">0</strong></span>
    <span class="stat">HITS <strong id="stat-hits" class="v-good">0</strong></span>
    <span class="stat">MISS <strong id="stat-misses" class="v-bad">0</strong></span>
  </div>
</header>

<div class="mode-bar">
  <span class="filter-label">MODE:</span>
  <button class="mode-btn active" data-mode="tutorial">▸ Tutorial</button>
  <button class="mode-btn" data-mode="challenge">▸ Challenge</button>
  <span class="spacer"></span>
  <button class="reset-btn" id="btn-reset">↻ Reset Run</button>
</div>

<div class="container">

  <aside class="sidebar">
    <div class="sidebar-title">▸ Scenario Index</div>
    <div id="toc"></div>
    <hr class="sidebar-divider">
    <div class="sidebar-title">▸ Run Stats</div>
    <div class="sidebar-stat"><span>Total Score</span><strong id="side-score">0</strong></div>
    <div class="sidebar-stat"><span>Avg / Scenario</span><strong id="side-avg">-</strong></div>
    <div class="sidebar-stat"><span>True Positives</span><strong id="side-tp" style="color:var(--green)">0</strong></div>
    <div class="sidebar-stat"><span>Missed</span><strong id="side-miss" style="color:var(--red)">0</strong></div>
    <div class="sidebar-stat"><span>False Positives</span><strong id="side-fp" style="color:var(--amber)">0</strong></div>
  </aside>

  <main id="main"></main>

</div>

<script>
/* ============================================================

/* ============================================================

/* ============================================================
   STATE
   ============================================================ */
const state = {
  mode: 'tutorial',
  scenarioIdx: 0,
  selected: new Set(),
  revealed: false,
  hintShown: false,
  activeTab: 'analysis',
  totalScore: 0,
  totalHits: 0,
  totalMisses: 0,
  totalFps: 0,
  results: {},  // {scenarioIdx: {score, hits, misses, fps}}
};

/* ============================================================
   HELPERS
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function escapeHtml(s) {
  // We use innerHTML for our authored content, so this is for safety on dynamic strings.
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  renderHeader();
  renderSidebar();

  const main = $('#main');
  if (state.scenarioIdx >= SCENARIOS.length) {
    main.innerHTML = renderComplete();
    bindComplete();
    return;
  }

  const sc = SCENARIOS[state.scenarioIdx];
  main.innerHTML = `
    ${renderScenarioHeader(sc)}
    <div class="sc-body">
      <div class="sc-brief">${sc.brief}</div>
      ${state.mode === 'tutorial' && !state.revealed ? renderInstructions() : ''}
      ${state.hintShown && state.mode === 'tutorial' && !state.revealed ? renderHint(sc) : ''}
    </div>
    ${sc.viewType === 'flows' ? renderFlowsTable(sc) : renderLogStream(sc)}
    ${renderControls(sc)}
    ${state.revealed ? renderReveal(sc) : ''}
  `;
  bindRows(sc);
  bindControls(sc);
  if (state.revealed) bindRevealTabs(sc);
}

function renderHeader() {
  $('#stat-scenario').textContent = `${Math.min(state.scenarioIdx + 1, SCENARIOS.length)}/${SCENARIOS.length}`;
  $('#stat-score').textContent = state.totalScore;
  $('#stat-hits').textContent = state.totalHits;
  $('#stat-misses').textContent = state.totalMisses;
}

function renderSidebar() {
  const toc = $('#toc');
  toc.innerHTML = SCENARIOS.map((sc, i) => {
    const result = state.results[i];
    const isActive = i === state.scenarioIdx;
    const isDone = !!result;
    let mark = '';
    if (isDone) {
      const cls = result.score >= 80 ? 'pass' : result.score >= 50 ? 'partial' : 'fail';
      mark = `<span class="toc-mark ${cls}">${result.score}</span>`;
    } else if (isActive) {
      mark = `<span class="toc-mark">▸</span>`;
    }
    return `
      <div class="toc-item ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}" data-idx="${i}">
        <span class="toc-id">${sc.id}</span>
        <span class="toc-name">${sc.title}</span>
        ${mark}
      </div>
    `;
  }).join('');

  $$('.toc-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      // Only allow nav to current/done scenarios
      if (idx > state.scenarioIdx) return;
      state.scenarioIdx = idx;
      state.selected.clear();
      state.revealed = !!state.results[idx];
      state.hintShown = false;
      state.activeTab = 'analysis';
      // If revisiting a done scenario, repopulate selected with what they picked? Skip for v1 - just show explanation fresh.
      if (state.revealed) state.selected = new Set(SCENARIOS[idx].malicious);
      render();
    });
  });

  // Run stats
  const done = Object.keys(state.results).length;
  $('#side-score').textContent = state.totalScore;
  $('#side-avg').textContent = done ? Math.round(state.totalScore / done) : '-';
  $('#side-tp').textContent = state.totalHits;
  $('#side-miss').textContent = state.totalMisses;
  $('#side-fp').textContent = state.totalFps;
}

function renderScenarioHeader(sc) {
  const diffClass = `diff-${sc.difficulty.toLowerCase()}`;
  return `
    <div class="sc-header">
      <span class="sc-id">${sc.id}</span>
      <span class="sc-name">${sc.title}</span>
      <span class="diff-badge ${diffClass}">${sc.difficulty}</span>
      <span class="view-tag">${sc.viewType === 'flows' ? 'flow.records' : 'log.stream'}</span>
    </div>
  `;
}

function renderInstructions() {
  return `
    <div class="callout">
      <span class="callout-label">▸ Instructions</span>
      Click rows you believe are malicious. Press <strong>Submit</strong> to evaluate.
      Use <strong>Hint</strong> if you're stuck - disabled in challenge mode.
    </div>
  `;
}

function renderHint(sc) {
  return `
    <div class="callout hint">
      <span class="callout-label">▸ Analyst Hint</span>
      ${sc.hint}
    </div>
  `;
}

function renderFlowsTable(sc) {
  // Fields default to the standard flow shape but can be overridden per scenario
  const fields = sc.fields || ['time', 'src', 'dst', 'port', 'proto', 'pkts', 'bytes', 'dur'];
  const cellClass = { port: 'col-port', proto: 'col-proto' };

  const rows = sc.rows.map((r, i) => {
    const cls = rowClass(i, sc);
    const mark = state.selected.has(i) && !state.revealed ? '▸' : '';
    const cells = fields.map(f => {
      const c = cellClass[f] ? ` class="${cellClass[f]}"` : '';
      return `<td${c}>${r[f] !== undefined ? r[f] : ''}</td>`;
    }).join('');
    return `
      <tr data-idx="${i}" class="${cls}">
        <td class="col-idx"><span class="row-mark">${mark}</span>${String(i + 1).padStart(2, '0')}</td>
        ${cells}
      </tr>`;
  }).join('');

  return `
    <div class="data-view">
      <div class="code-hdr">
        <span class="code-lang">flow.records</span>
        <span class="code-meta">${sc.rows.length} sessions · click rows to flag</span>
      </div>
      <table class="flows">
        <thead><tr>${sc.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderLogStream(sc) {
  const lines = sc.rows.map((r, i) => {
    const cls = rowClass(i, sc);
    const mark = state.selected.has(i) && !state.revealed ? '▸' : '';
    return `
      <div class="log-line ${cls}" data-idx="${i}">
        <span class="log-idx">${mark}${String(i + 1).padStart(2, '0')}</span>
        <span class="log-time">${r.time}</span>
        <span class="log-source">${r.src}</span>
        <span class="log-msg">${r.msg}</span>
      </div>`;
  }).join('');

  return `
    <div class="data-view">
      <div class="code-hdr">
        <span class="code-lang">log.stream</span>
        <span class="code-meta">${sc.rows.length} events · click lines to flag</span>
      </div>
      <div class="log-stream">${lines}</div>
    </div>
  `;
}

function rowClass(idx, sc) {
  if (!state.revealed) return state.selected.has(idx) ? 'selected' : '';
  const isMal = sc.malicious.includes(idx);
  const isSel = state.selected.has(idx);
  if (isMal && isSel) return 'correct';
  if (isMal && !isSel) return 'missed';
  if (!isMal && isSel) return 'fp';
  return '';
}

function renderControls(sc) {
  if (state.revealed) {
    return `
      <div class="controls">
        <span class="sel-count">▸ Analysis submitted · review findings below</span>
      </div>
    `;
  }
  const showHint = state.mode === 'tutorial' && !state.hintShown;
  return `
    <div class="controls">
      <span class="sel-count">▸ Selected: <strong>${state.selected.size}</strong> ${state.selected.size === 1 ? 'flow' : 'flows'}</span>
      <div class="btn-group">
        ${showHint ? '<button class="btn btn-warn" id="btn-hint">▸ Hint</button>' : ''}
        <button class="btn" id="btn-clear" ${state.selected.size === 0 ? 'disabled' : ''}>↻ Clear</button>
        <button class="btn btn-primary" id="btn-submit" ${state.selected.size === 0 ? 'disabled' : ''}>▸ Submit Analysis</button>
      </div>
    </div>
  `;
}

function renderReveal(sc) {
  const r = scoreScenario(sc);
  const tone = r.score >= 80 ? '' : r.score >= 50 ? 'partial' : 'fail';
  const verdict = r.score >= 80 ? 'CONFIRMED' : r.score >= 50 ? 'PARTIAL' : 'INCONCLUSIVE';
  const vClass = r.score >= 80 ? 'v-confirmed' : r.score >= 50 ? 'v-partial' : 'v-incon';

  return `
    <div class="reveal ${tone}">
      <div class="reveal-hdr">

          <span class="s-miss">✗ ${r.misses} MISSED</span>
          <span class="s-fp">! ${r.fps} FALSE POS</span>
        </div>
      </div>

      <div class="tab-bar">
        <button class="dtab ${state.activeTab === 'analysis' ? 'active' : ''}" data-tab="analysis">▸ Analysis</button>
        <button class="dtab t-mit ${state.activeTab === 'mitre' ? 'active' : ''}" data-tab="mitre">▸ MITRE</button>
        <button class="dtab t-det ${state.activeTab === 'detect' ? 'active' : ''}" data-tab="detect">▸ Detection</button>
      </div>

      <div class="tab-panel ${state.activeTab === 'analysis' ? 'active' : ''}" data-panel="analysis">
        <p>${sc.explanation}</p>
      </div>

      <div class="tab-panel ${state.activeTab === 'mitre' ? 'active' : ''}" data-panel="mitre">
        <div class="mitre-list">
          ${sc.mitre.map(m => `
            <div class="mitre-tag">
              <span class="mitre-id">${m.id}</span>
              <span class="mitre-name">${m.name}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="tab-panel ${state.activeTab === 'detect' ? 'active' : ''}" data-panel="detect">
        <p style="color:var(--text3);font-size:11px;margin-bottom:12px;">Paste-ready detection logic. Variables like <code>$HOME_NET</code> are placeholders - replace with values from your environment.</p>
        ${sc.detection.map((d, i) => `
          <div class="detect-block">
            <div class="detect-hdr">
              <span class="detect-lang l-${d.tool === 'arkime' ? 'ark' : d.tool === 'kibana' ? 'kib' : 'sur'}">${d.label}</span>

          ▸ ${state.scenarioIdx + 1 < SCENARIOS.length ? 'Next Scenario' : 'Finish Run'}
        </button>
      </div>

}

function renderComplete() {
  const max = SCENARIOS.length * 100;
  const pct = Math.round((state.totalScore / max) * 100);
  const tone = pct >= 80 ? '' : pct >= 60 ? 'partial' : 'fail';
  const verdict = pct >= 80 ? 'EXCELLENT - ANALYST GRADE'
                : pct >= 60 ? 'PROFICIENT - KEEP HUNTING'
                : pct >= 40 ? 'DEVELOPING - REVIEW MISSES'
                            : 'NEEDS PRACTICE - RERUN TUTORIAL';

  return `
    <div class="complete">
      <h2>▸ RUN COMPLETE</h2>
      <div class="sub">${SCENARIOS.length} scenario${SCENARIOS.length !== 1 ? 's' : ''} reviewed · session terminated</div>
      <div class="final-score ${tone}">${pct}%</div>
      <div class="final-verdict">${verdict}</div>
      <div class="summary-grid">
        <div class="summary-cell">
          <div class="lbl">True Positives</div>
          <div class="val" style="color:var(--green)">${state.totalHits}</div>
        </div>
        <div class="summary-cell">
          <div class="lbl">Missed</div>
          <div class="val" style="color:var(--red)">${state.totalMisses}</div>
        </div>
        <div class="summary-cell">
          <div class="lbl">False Positives</div>
          <div class="val" style="color:var(--amber)">${state.totalFps}</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-restart">▸ New Run</button>
        <a href="https://hunt.6b74.dev" class="btn">▸ Open Hunt Reference</a>
      </div>
    </div>
  `;
}

/* ============================================================
   SCORING
   ============================================================ */
function scoreScenario(sc) {
  const malSet = new Set(sc.malicious);
  let hits = 0, misses = 0, fps = 0;
  for (const idx of state.selected) {
    if (malSet.has(idx)) hits++;
    else fps++;
  }
  for (const idx of malSet) {
    if (!state.selected.has(idx)) misses++;
  }
  const perItem = 100 / sc.malicious.length;
  const raw = hits * perItem - fps * (perItem * 0.5);
  return { hits, misses, fps, score: Math.max(0, Math.min(100, Math.round(raw))) };
}

/* ============================================================
   BINDINGS
   ============================================================ */
function bindRows(sc) {
  const sel = sc.viewType === 'flows' ? 'tbody tr' : '.log-line';
  $$(sel).forEach(el => {
    el.addEventListener('click', () => {
      if (state.revealed) return;
      const idx = parseInt(el.dataset.idx, 10);
      if (state.selected.has(idx)) state.selected.delete(idx);
      else state.selected.add(idx);
      render();
    });
  });
}

function bindControls(sc) {
  const hint = $('#btn-hint');
  if (hint) hint.addEventListener('click', () => { state.hintShown = true; render(); });

  const clear = $('#btn-clear');
  if (clear) clear.addEventListener('click', () => { state.selected.clear(); render(); });

  const submit = $('#btn-submit');
  if (submit) submit.addEventListener('click', () => {
    state.revealed = true;
    state.activeTab = 'analysis';
    const r = scoreScenario(sc);
    state.totalScore += r.score;
    state.totalHits += r.hits;
    state.totalMisses += r.misses;
    state.totalFps += r.fps;
    state.results[state.scenarioIdx] = r;
    render();
  });

  const next = $('#btn-next');
  if (next) next.addEventListener('click', () => {
    state.scenarioIdx++;
    state.selected.clear();
    state.revealed = false;
    state.hintShown = false;
    state.activeTab = 'analysis';
    render();
  });
}

function bindRevealTabs(sc) {
  $$('.dtab').forEach(t => {
    t.addEventListener('click', () => {
      state.activeTab = t.dataset.tab;
      $$('.dtab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      $$('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.dataset.panel === state.activeTab);
      });
    });
  });

  $$('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = $('#' + btn.dataset.copy);
      if (!target) return;
      navigator.clipboard.writeText(target.textContent).then(() => {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '⧉ Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
  });
}

function bindComplete() {
  const r = $('#btn-restart');
  if (r) r.addEventListener('click', () => resetRun());
}

function resetRun() {
  state.scenarioIdx = 0;
  state.selected.clear();
  state.revealed = false;
  state.hintShown = false;
  state.activeTab = 'analysis';
  state.totalScore = 0;
  state.totalHits = 0;
  state.totalMisses = 0;
  state.totalFps = 0;
  state.results = {};
  render();
}

/* ============================================================
   MODE + RESET
   ============================================================ */
$$('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    state.hintShown = false;
    render();
  });
});

$('#btn-reset').addEventListener('click', () => {
  if (Object.keys(state.results).length > 0 || state.selected.size > 0) {
    if (!confirm('Reset run? All progress will be lost.')) return;
  }
  resetRun();
});

  { t: 680, txt: '  ▸ OK', cls: 'boot-ok' },
  { t: 760, txt: 'tuning detection rules .......................', cls: '' },
  { t: 920, txt: '  ▸ OK · MITRE ATT&CK v15 mapped', cls: 'boot-ok' },
  { t: 1020, txt: 'arming behavioral analytics ..................', cls: '' },
  { t: 1180, txt: '  ▸ caffeine levels: critical', cls: 'boot-warn' },
  { t: 1280, txt: '', cls: '' },
  { t: 1340, txt: '▸ session ready. happy hunting.', cls: 'boot-ok' },
];

function runBoot() {
  const inner = document.getElementById('boot-inner');
  // If user has visited before this run, skip the boot
  if (sessionStorage.getItem('sta_booted') === '1') {
    document.getElementById('boot').style.display = 'none';
    return Promise.resolve();
  }
  return new Promise(resolve => {
    BOOT_LINES.forEach(line => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'boot-line ' + line.cls;
        div.textContent = line.txt || '\u00a0';
        inner.appendChild(div);
        inner.scrollTop = inner.scrollHeight;
      }, line.t);
    });
    setTimeout(() => {
      const cursor = document.createElement('span');
      cursor.className = 'boot-cursor';
      inner.lastChild.appendChild(cursor);
    }, BOOT_LINES[BOOT_LINES.length - 1].t + 50);
    setTimeout(() => {
      document.getElementById('boot').classList.add('gone');
      sessionStorage.setItem('sta_booted', '1');
      setTimeout(resolve, 350);
    }, BOOT_LINES[BOOT_LINES.length - 1].t + 700);
  });
}

/* INIT */
runBoot().then(render);
</script>
</body>
